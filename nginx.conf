server {
    listen 8081;
    listen [::]:8081;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /dashboard/profile {
        return 308 /dashboard/profile/;
    }

    # Static export cannot generate arbitrary profile names. Serve the single
    # profile shell for exactly one client-side slug segment without redirecting.
    location ~ ^/dashboard/profile/[^/]+/?$ {
        try_files /dashboard/profile/index.html =404;
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
